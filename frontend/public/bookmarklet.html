<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ApaView · Instalar el botón de Yad2</title>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #27272a;
      margin: 0;
      padding: 48px 20px 64px;
      line-height: 1.6;
    }

    .wrap {
      max-width: 500px;
      margin: 0 auto;
    }

    .titulo {
      width: 100%;
      display: block;
      margin-bottom: 40px;
    }

    .step {
      margin-bottom: 40px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e4e4e7;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
    }

    .step img {
      width: 100%;
      display: block;
    }

    /* Panel that sits below the step-1 image */
    .step-action {
      padding: 20px 24px 24px;
      border-top: 1px solid #e4e4e7;
    }

    .step-action p {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 500;
      color: #27272a;
    }

    .bm {
      display: inline-block;
      background: #18181b;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 10px;
      cursor: grab;
      user-select: none;
    }

    .bm:active {
      cursor: grabbing;
    }

    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: #71717a;
      background: #f4f4f5;
      border-radius: 10px;
      padding: 12px 14px;
    }

    code {
      background: #e4e4e7;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
    }

    details {
      margin-top: 12px;
    }

    summary {
      cursor: pointer;
      font-size: 13px;
      color: #a1a1aa;
    }

    summary:hover {
      color: #71717a;
    }

    textarea {
      width: 100%;
      height: 110px;
      margin-top: 10px;
      font-family: monospace;
      font-size: 11px;
      padding: 10px;
      border: 1px solid #e4e4e7;
      border-radius: 8px;
      box-sizing: border-box;
      background: #f4f4f5;
      color: #52525b;
      resize: vertical;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <img class="titulo" src="./Image_tutorial_bookmark_firstTime_titulo.png"
      alt="Cómo instalar ApaView — Guarda el botón en tu barra de favoritos para usarlo en anuncios de Yad2" />


    <div class="step-action">
      <p>Arrastra este botón a tu barra de favoritos:</p>
      <a class="bm" id="bm" href="#" onclick="return false;">🏠 APAVIEW</a>
    </div>


    <!-- Paso 1 -->
    <div class="step">
      <img src="./Image_tutorial_bookmark_firstTime_step1.png"
        alt="Paso 1: Arrastra el botón APAVIEW a tu barra de favoritos" />

    </div>

    <!-- Paso 2 -->
    <div class="step">
      <img src="./Image_tutorial_bookmark_firstTime_step2.png" alt="Paso 2: Abre un anuncio en Yad2" />
    </div>

    <!-- Paso 3 -->
    <div class="step">
      <img src="./Image_tutorial_bookmark_firstTime_step3.png"
        alt="Paso 3: Haz clic en APAVIEW para abrir el anuncio en ApaView" />
    </div>

    <details>
      <summary>Ver el código del favorito (instalación manual)</summary>
      <textarea id="src" readonly></textarea>
    </details>

  </div>

  <script>
    // The bookmarklet runs ON the Yad2 page: it reads the listing object from
    // __NEXT_DATA__ (same logic as findItemData in backend/scraper.js) and opens
    // ApaView with the data in the URL hash. APP_ORIGIN is baked from this page's
    // own origin so it always points at the right deploy (localhost or prod).
    var APP_ORIGIN = JSON.stringify(location.origin);
    var code =
      "javascript:(function(){try{" +
      "var el=document.getElementById('__NEXT_DATA__');" +
      "if(!el){alert('ApaView: abre primero la pagina de un anuncio de Yad2.');return;}" +
      "var nd=JSON.parse(el.textContent);" +
      "var ds=nd&&nd.props&&nd.props.pageProps&&nd.props.pageProps.dehydratedState;" +
      "var qs=(ds&&ds.queries)||[];" +
      "var item=null;" +
      "for(var i=0;i<qs.length;i++){var d=qs[i]&&qs[i].state&&qs[i].state.data;" +
      "if(d&&typeof d==='object'&&('adNumber' in d||'token' in d)&&'price' in d){item=d;break;}}" +
      "if(!item){alert('ApaView: no encontre los datos del anuncio en esta pagina.');return;}" +
      "var b64=btoa(unescape(encodeURIComponent(JSON.stringify({url:location.href,item:item}))));" +
      "window.open(" + APP_ORIGIN + "+'/#add='+encodeURIComponent(b64),'_blank');" +
      "}catch(e){alert('ApaView: error leyendo el anuncio ('+e.message+')');}})();";

    document.getElementById('bm').setAttribute('href', code);
    document.getElementById('src').value = code;
  </script>
</body>

</html>
